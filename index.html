<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Online-Editor</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        .container { display: flex; width: 100%; }
        
        /* Sidebar Styles */
        .sidebar { width: 250px; background: #f4f4f4; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #ddd; }
        #new-doc-btn { width: 100%; padding: 10px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        #doc-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; }
        #doc-list li { padding: 12px 15px; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.2s; }
        #doc-list li:hover { background: #e9e9e9; }
        #doc-list li.active { background: #007bff; color: white; }

        /* Editor Styles */
        .editor-area { flex-grow: 1; display: flex; flex-direction: column; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #editor { flex-grow: 1; resize: none; padding: 15px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; outline: none; }
        #status { font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <button id="new-doc-btn">+ Neues Dokument</button>
            </div>
            <ul id="doc-list"></ul>
        </aside>
        
        <main class="editor-area">
            <header>
                <h1 id="current-doc-title" style="margin:0; font-size: 1.5em;">Wähle ein Dokument</h1>
                <span id="status">Bereit</span>
            </header>
            <textarea id="editor" placeholder="Wähle ein Dokument aus der Liste oder erstelle ein neues..."></textarea>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
